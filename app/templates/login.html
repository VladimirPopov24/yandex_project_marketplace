{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-shop-window display-4 text-primary"></i>
                <h3 class="fw-bold mt-2">Войти в Modex</h3>
                <p class="text-muted small">Нет аккаунта? <a href="/auth/register">Зарегистрироваться</a></p>
            </div>

            <div class="card shadow border-0">
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger py-2 small">
                        <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
                    </div>
                    {% endif %}

                    <form method="post" action="/auth/login">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Логин</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0"
                                       placeholder="Ваш логин" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">Пароль</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0"
                                       placeholder="Ваш пароль" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                        </button>
                    </form>

                    <hr class="my-3">
                    <div class="bg-light rounded p-2 small text-muted text-center">
                        Демо-доступ: <strong>admin</strong> / <strong>admin123</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
